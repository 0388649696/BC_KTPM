[pytest]
# Định nghĩa các nhãn (Markers) phân luồng kịch bản kiểm thử
markers =
    gui: Kịch bản kiểm thử tương tác giao diện người dùng
    regression: Kịch bản kiểm thử hồi quy toàn hệ thống
    auth: Kịch bản kiểm thử phân hệ xác thực

# Cấu hình mặc định: Chạy có giao diện (headed) để quan sát luồng thực thi
addopts = --headed --browser chromium -v -s